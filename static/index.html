<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>collide-o-scope</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <main class="columns">
      <!-- LEFT: Library -->
      <aside class="col-left">
        <h3 class="panel-title">Library</h3>
        <div class="library-grid" id="library-grid">
          <!-- Library items rendered by JS -->
        </div>
      </aside>

      <!-- CENTER: Layers -->
      <section class="col-center">
        <div class="layers-section">
          <div class="layers-list" id="layers-list">
            <!-- Layer cards rendered by JS -->
          </div>
          <div class="layers-empty" id="layers-empty">
            <p>No active layers</p>
            <p class="dim">Double-click library items to add</p>
          </div>
        </div>
      </section>

      <!-- RIGHT: Transport + Master Effects -->
      <aside class="col-right">
        <div class="transport-row">
          <button class="transport-btn" id="btn-play-all" title="Play All">&#x25B6;</button>
          <button class="transport-btn" id="btn-stop" title="Reset FX">&#x21BA;</button>
          <span class="ws-dot" id="ws-status" title="connecting..."></span>
        </div>
        <h3 class="panel-title">Master Effects</h3>
        <div class="fx-scroll" id="master-fx">
          <div class="fx-group" data-group="digital">
            <div class="fx-group-header">
              <span class="chevron">&#x25BC;</span>
              <span class="group-label">DIGITAL</span>
              <button class="group-reset" data-group="digital">reset</button>
            </div>
            <div class="fx-group-body">
              <div class="param-row" data-param="pixelate" data-min="1" data-max="32" data-step="1">
                <label>Pixelate</label><input type="range"><span class="value">1</span>
              </div>
              <div class="param-row" data-param="rgb_split" data-min="0" data-max="30" data-step="0.5">
                <label>RGB Split</label><input type="range"><span class="value">0</span>
              </div>
              <div class="param-row" data-param="hue_shift" data-min="-180" data-max="180" data-step="1">
                <label>Hue</label><input type="range"><span class="value">0</span>
              </div>
              <div class="param-row" data-param="saturation" data-min="-1" data-max="1" data-step="0.01">
                <label>Saturation</label><input type="range"><span class="value">0</span>
              </div>
              <div class="param-row" data-param="brightness" data-min="-1" data-max="1" data-step="0.01">
                <label>Brightness</label><input type="range"><span class="value">0</span>
              </div>
              <div class="param-row" data-param="contrast" data-min="-1" data-max="1" data-step="0.01">
                <label>Contrast</label><input type="range"><span class="value">0</span>
              </div>
              <div class="param-row" data-param="posterize" data-min="0" data-max="16" data-step="1">
                <label>Posterize</label><input type="range"><span class="value">0</span>
              </div>
              <div class="param-row toggle-row" data-param="invert">
                <label>Invert</label>
                <label class="toggle"><input type="checkbox"><span class="toggle-slider"></span></label>
              </div>
            </div>
          </div>

          <div class="fx-group" data-group="analog">
            <div class="fx-group-header">
              <span class="chevron">&#x25BC;</span>
              <span class="group-label">ANALOG</span>
              <button class="group-reset" data-group="analog">reset</button>
            </div>
            <div class="fx-group-body">
              <div class="param-row" data-param="grain_intensity" data-min="0" data-max="0.3" data-step="0.005">
                <label>Grain</label><input type="range"><span class="value">0</span>
              </div>
              <div class="param-row" data-param="grain_size" data-min="1" data-max="4" data-step="0.25">
                <label>Size</label><input type="range"><span class="value">1</span>
              </div>
              <div class="param-row select-row" data-param="grain_algo">
                <label>Algorithm</label>
                <select>
                  <option value="0">Gaussian</option>
                  <option value="1">Perlin</option>
                  <option value="2">Salt&amp;Pepper</option>
                  <option value="3">Blue</option>
                </select>
              </div>
              <div class="param-row toggle-row" data-param="color_grain">
                <label>Color Grain</label>
                <label class="toggle"><input type="checkbox"><span class="toggle-slider"></span></label>
              </div>
              <div class="param-row" data-param="vignette" data-min="0" data-max="1.5" data-step="0.01">
                <label>Vignette</label><input type="range"><span class="value">0</span>
              </div>
              <div class="param-row" data-param="color_drift" data-min="0" data-max="0.02" data-step="0.001">
                <label>Drift</label><input type="range"><span class="value">0</span>
              </div>
            </div>
          </div>

          <div class="fx-group" data-group="motion">
            <div class="fx-group-header">
              <span class="chevron">&#x25BC;</span>
              <span class="group-label">MOTION</span>
              <button class="group-reset" data-group="motion">reset</button>
            </div>
            <div class="fx-group-body">
              <div class="param-row" data-param="breathe_scale" data-min="0" data-max="0.05" data-step="0.001">
                <label>Bth Scale</label><input type="range"><span class="value">0</span>
              </div>
              <div class="param-row" data-param="breathe_rotation" data-min="0" data-max="2" data-step="0.05">
                <label>Bth Rotate</label><input type="range"><span class="value">0</span>
              </div>
              <div class="param-row" data-param="breathe_position" data-min="0" data-max="0.02" data-step="0.001">
                <label>Bth Drift</label><input type="range"><span class="value">0</span>
              </div>
            </div>
          </div>

          <div class="fx-group" data-group="vhs" id="vhs-group">
            <div class="fx-group-header">
              <span class="chevron">&#x25BC;</span>
              <span class="group-label">VHS</span>
              <button class="group-reset" data-group="vhs">reset</button>
            </div>
            <div class="fx-group-body">
              <div class="param-row toggle-row" data-ntsc="enabled">
                <label>Enable</label>
                <label class="toggle"><input type="checkbox"><span class="toggle-slider"></span></label>
              </div>
              <div class="param-row select-row" data-ntsc="tape_speed">
                <label>Tape Speed</label>
                <select>
                  <option value="0">SP</option>
                  <option value="1">LP</option>
                  <option value="2">EP</option>
                </select>
              </div>
              <div class="param-row toggle-row" data-ntsc="head_switching_enabled">
                <label>Head Sw.</label>
                <label class="toggle"><input type="checkbox"><span class="toggle-slider"></span></label>
              </div>
              <div class="param-row" data-ntsc="head_switching_height" data-min="0" data-max="24" data-step="1">
                <label>Head Height</label><input type="range"><span class="value">8</span>
              </div>
              <div class="param-row" data-ntsc="head_switching_shift" data-min="-100" data-max="100" data-step="1">
                <label>Head Shift</label><input type="range"><span class="value">0</span>
              </div>
              <div class="param-row toggle-row" data-ntsc="tracking_noise_enabled">
                <label>Tracking</label>
                <label class="toggle"><input type="checkbox"><span class="toggle-slider"></span></label>
              </div>
              <div class="param-row" data-ntsc="tracking_noise_height" data-min="0" data-max="120" data-step="1">
                <label>Track Height</label><input type="range"><span class="value">24</span>
              </div>
              <div class="param-row" data-ntsc="tracking_noise_wave" data-min="0" data-max="50" data-step="0.5">
                <label>Track Wave</label><input type="range"><span class="value">0</span>
              </div>
              <div class="param-row" data-ntsc="tracking_noise_snow" data-min="0" data-max="1" data-step="0.01">
                <label>Track Snow</label><input type="range"><span class="value">0</span>
              </div>
              <div class="param-row" data-ntsc="snow_intensity" data-min="0" data-max="1" data-step="0.01">
                <label>Snow</label><input type="range"><span class="value">0</span>
              </div>
              <div class="param-row" data-ntsc="composite_noise_intensity" data-min="0" data-max="0.5" data-step="0.005">
                <label>Comp Noise</label><input type="range"><span class="value">0</span>
              </div>
              <div class="param-row" data-ntsc="luma_noise_intensity" data-min="0" data-max="0.2" data-step="0.005">
                <label>Luma Noise</label><input type="range"><span class="value">0</span>
              </div>
              <div class="param-row" data-ntsc="chroma_noise_intensity" data-min="0" data-max="0.5" data-step="0.005">
                <label>Chroma Noise</label><input type="range"><span class="value">0</span>
              </div>
              <div class="param-row" data-ntsc="chroma_loss" data-min="0" data-max="0.01" data-step="0.0005">
                <label>Chroma Loss</label><input type="range"><span class="value">0</span>
              </div>
              <div class="param-row toggle-row" data-ntsc="edge_wave_enabled">
                <label>Edge Wave</label>
                <label class="toggle"><input type="checkbox"><span class="toggle-slider"></span></label>
              </div>
              <div class="param-row" data-ntsc="edge_wave_intensity" data-min="0" data-max="20" data-step="0.5">
                <label>Wave Amt</label><input type="range"><span class="value">0</span>
              </div>
              <div class="param-row" data-ntsc="edge_wave_speed" data-min="0" data-max="10" data-step="0.1">
                <label>Wave Speed</label><input type="range"><span class="value">0.5</span>
              </div>
              <div class="param-row" data-ntsc="luma_smear" data-min="0" data-max="1" data-step="0.01">
                <label>Luma Smear</label><input type="range"><span class="value">0</span>
              </div>
              <div class="param-row" data-ntsc="composite_sharpening" data-min="-1" data-max="2" data-step="0.05">
                <label>Sharpening</label><input type="range"><span class="value">0</span>
              </div>
            </div>
          </div>
        </div>
      </aside>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
